<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSAFY RAG Chatbot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="app-shell">
        <section class="chat-card">
            <header class="chat-header">
                <div>
                    <p class="eyebrow">RAG Chatbot</p>
                    <h1>SSAFY 학습 도우미</h1>
                </div>
                <p class="header-copy">문서를 업로드한 뒤 질문하면, 서버가 유사한 문서를 검색해 AI 답변 근거로 사용합니다.</p>
            </header>

            <section class="upload-panel">
                <form id="upload-form" class="upload-form">
                    <div class="upload-copy">
                        <h2>문서 업로드</h2>
                        <p>지원 형식: `.txt`, `.md`, `.pdf`</p>
                    </div>
                    <input id="file-input" type="file" name="file" accept=".txt,.md,.pdf" required>
                    <button id="upload-button" type="submit">업로드</button>
                </form>
                <p id="upload-status" class="status-inline" role="status"></p>
            </section>

            <section id="chat-window" class="chat-window" aria-live="polite">
                <div class="message bot">
                    <p class="message-text">안녕하세요. 문서를 업로드하고 질문해 보세요.</p>
                    <p class="message-meta">아직 업로드 문서를 찾지 못하면 일반 AI 답변으로 응답합니다.</p>
                </div>
            </section>

            <form id="chat-form" class="chat-form">
                <label class="sr-only" for="user-input">질문 입력</label>
                <input
                    id="user-input"
                    name="message"
                    type="text"
                    placeholder="예: 업로드한 문서를 기준으로 SSAFY 커리큘럼을 요약해 줘"
                    autocomplete="off"
                    required
                >
                <button id="send-button" type="submit">전송</button>
            </form>

            <p id="status-message" class="status-message" role="status"></p>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
